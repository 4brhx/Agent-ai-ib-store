<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent AI - GPT-5.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c63ff;
            --primary-dark: #5a52d5;
            --primary-light: #8b83ff;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-green: #00d4aa;
            --accent-blue: #00b4d8;
            --gradient-1: linear-gradient(135deg, #6c63ff 0%, #00d4aa 100%);
            --gradient-2: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --shadow: 0 10px 40px rgba(108, 99, 255, 0.15);
            --radius: 16px;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .bg-animation .orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-animation .orb:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--accent-green);
            bottom: -50px;
            left: -50px;
            animation-delay: 3s;
        }

        .bg-animation .orb:nth-child(3) {
            width: 200px;
            height: 200px;
            background: var(--accent-blue);
            top: 50%;
            left: 50%;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Header */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(108, 99, 255, 0.2);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .header-logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--accent-green);
        }

        .header-badge .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat Container */
        .chat-container {
            position: relative;
            z-index: 10;
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(108, 99, 255, 0.3);
            border-radius: 3px;
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-screen .ai-avatar {
            width: 100px;
            height: 100px;
            background: var(--gradient-1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(108, 99, 255, 0.3);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .welcome-screen h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-screen p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            max-width: 600px;
            width: 100%;
        }

        .suggestion-card {
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: right;
        }

        .suggestion-card:hover {
            background: rgba(108, 99, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .suggestion-card .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .suggestion-card .text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-start;
            flex-direction: row;
        }

        .message.assistant {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: rgba(108, 99, 255, 0.2);
            border: 1px solid rgba(108, 99, 255, 0.3);
        }

        .message.assistant .avatar {
            background: var(--gradient-1);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
        }

        .message .bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-top-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top-left-radius: 4px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 12px;
            align-self: flex-end;
            flex-direction: row-reverse;
            max-width: 85%;
        }

        .typing-indicator .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .typing-indicator .dots {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            border-top-left-radius: 4px;
        }

        .typing-indicator .dots span {
            width: 8px;
            height: 8px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* Input Area */
        .input-area {
            position: relative;
            z-index: 10;
            padding: 16px 24px 24px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(108, 99, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-input);
            border: 1px solid rgba(108, 99, 255, 0.2);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.15);
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
            padding: 10px 0;
            line-height: 1.5;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            transform: rotate(180deg);
        }

        /* Footer */
        .footer-text {
            text-align: center;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .chat-container {
                padding: 16px;
            }

            .message {
                max-width: 92%;
            }

            .input-area {
                padding: 12px 16px 16px;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }

            .welcome-screen h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-logo">
            <div class="logo-icon">AI</div>
            <h1>Agent GPT-5.4</h1>
        </div>
        <div class="header-badge">
            <span class="dot"></span>
            <span>متصل</span>
        </div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="ai-avatar">🤖</div>
            <h2>مرحباً، أنا Agent GPT-5.4</h2>
            <p>مساعدك الذكي المدعوم بأحدث تقنيات الذكاء الاصطناعي. اسألني أي شيء وسأساعدك بأفضل إجابة.</p>
            <div class="suggestions">
                <div class="suggestion-card" onclick="useSuggestion('اكتب لي كود بلغة Python لتحليل البيانات')">
                    <div class="icon">💻</div>
                    <div class="text">اكتب لي كود بلغة Python</div>
                </div>
                <div class="suggestion-card" onclick="useSuggestion('اشرح لي مفهوم الذكاء الاصطناعي')">
                    <div class="icon">🧠</div>
                    <div class="text">اشرح لي مفهوم الذكاء الاصطناعي</div>
                </div>
                <div class="suggestion-card" onclick="useSuggestion('ساعدني في كتابة مقال احترافي')">
                    <div class="icon">✍️</div>
                    <div class="text">ساعدني في كتابة مقال</div>
                </div>
                <div class="suggestion-card" onclick="useSuggestion('ما هي أفضل استراتيجيات التسويق الرقمي؟')">
                    <div class="icon">📈</div>
                    <div class="text">استراتيجيات التسويق الرقمي</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea 
                id="messageInput" 
                placeholder="اكتب رسالتك هنا..." 
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
        <div class="footer-text">Agent GPT-5.4 • مدعوم بتقنية OpenRouter AI</div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');

        let conversationHistory = [];

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function useSuggestion(text) {
            messageInput.value = text;
            autoResize(messageInput);
            sendMessage();
        }

        function addMessage(content, role) {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';

            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });

            // Clear input
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Show typing
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();

                removeTyping();

                if (data.error) {
                    addMessage('عذراً، حدث خطأ. يرجى المحاولة مرة أخرى.', 'assistant');
                } else {
                    const assistantMessage = data.choices[0].message.content;
                    addMessage(assistantMessage, 'assistant');
                    conversationHistory.push({ role: 'assistant', content: assistantMessage });
                }
            } catch (error) {
                removeTyping();
                addMessage('عذراً، لا يمكن الاتصال بالخادم. تأكد من اتصالك بالإنترنت.', 'assistant');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }
    </script>
</body>
</html>
