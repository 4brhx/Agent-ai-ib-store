<script>
// Configuration - API keys are stored in Vercel environment variables
const CONFIG = {
  deepseekModel: 'deepseek/deepseek-chat-v3-0324',
  chatEndpoint: '/api/chat',
  visionEndpoint: '/api/vision'
};

// State
let messages = [];
let attachments = [];
let allChats = JSON.parse(localStorage.getItem('ib_chats') || '[]');
let currentChatId = null;

// DOM
const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const attachPreview = document.getElementById('attachPreview');

// Initialize
function init() {
  newConversation(true);
  msgInput.focus();
}

// Auto resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// File handling
function handleFiles(e) {
  for (let f of e.target.files) {
    if (!f.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = (ev) => {
      attachments.push({ name: f.name, data: ev.target.result, type: f.type });
      renderAttachments();
    };
    reader.readAsDataURL(f);
  }
  e.target.value = '';
}

function removeAttachment(idx) {
  attachments.splice(idx, 1);
  renderAttachments();
}

function renderAttachments() {
  if (!attachments.length) {
    attachPreview.className = 'attach-preview';
    attachPreview.innerHTML = '';
    return;
  }
  attachPreview.className = 'attach-preview active';
  attachPreview.innerHTML = attachments.map((a, i) =>
    `<div class="attach-item">
      <img src="${a.data}">
      <span>${a.name.substring(0, 15)}</span>
      <span class="remove" onclick="removeAttachment(${i})">✕</span>
    </div>`
  ).join('');
}

// New conversation
function newConversation(silent) {
  messages = [];
  attachments = [];
  currentChatId = Date.now().toString();
  renderAttachments();
  if (!silent) {
    chatArea.innerHTML = `<div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Welcome to <span class="gr">IB Agent</span></h2>
      <p>مساعدك الذكي المتكامل — محادثات ذكية بواسطة DeepSeek وتحليل الصور بواسطة Gemini Flash.</p>
      <div class="quick-cards">
        <div class="qcard" onclick="quickSend('اكتب لي كود Python لعمل API بسيط')"><span class="emoji">💻</span><span class="label">كتابة كود</span></div>
        <div class="qcard" onclick="quickSend('حلل لي هذه الصورة بالتفصيل')"><span class="emoji">🔍</span><span class="label">تحليل صورة</span></div>
        <div class="qcard" onclick="quickSend('اشرح لي الذكاء الاصطناعي ببساطة')"><span class="emoji">🧠</span><span class="label">شرح مفاهيم</span></div>
        <div class="qcard" onclick="quickSend('ساعدني في كتابة مقال احترافي')"><span class="emoji">✍️</span><span class="label">كتابة محتوى</span></div>
      </div>
    </div>`;
  }
}

// Save chat
function saveChat() {
  if (!messages.length) return;
  let idx = allChats.findIndex(c => c.id === currentChatId);
  const chatData = {
    id: currentChatId,
    messages: messages,
    preview: messages[0]?.content?.substring?.(0, 50) || 'محادثة جديدة',
    date: new Date().toLocaleDateString('ar-SA'),
    timestamp: Date.now()
  };
  if (idx > -1) allChats[idx] = chatData;
  else allChats.unshift(chatData);
  if (allChats.length > 30) allChats = allChats.slice(0, 30);
  localStorage.setItem('ib_chats', JSON.stringify(allChats));
}

// Load chat
function loadChat(id) {
  const chat = allChats.find(c => c.id === id);
  if (!chat) return;
  currentChatId = id;
  messages = chat.messages || [];
  chatArea.innerHTML = '';
  messages.forEach(m => {
    if (m.role === 'user') addMessage(m.displayText || m.content, 'user', m.files, true);
    else addMessage(m.content, 'bot', null, true);
  });
  closeModal();
}

// Format text
function formatText(text) {
  if (!text) return '';
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/^\* (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

// Add message to UI
function addMessage(text, who, files, noAnim) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${who}`;
  if (!noAnim) div.style.animation = 'msgIn .25s cubic-bezier(.4,0,.2,1)';

  let filesHtml = '';
  if (files && files.length) {
    filesHtml = '<div class="file-preview">' + files.map(f => `<img src="${f.data}">`).join('') + '</div>';
  }

  const content = who === 'user'
    ? (text || '').replace(/</g, '&lt;').replace(/\n/g, '<br>')
    : formatText(text || '');

  div.innerHTML = `
    <div class="avatar">${who === 'user' ? '👤' : '✦'}</div>
    <div class="bubble">${filesHtml}${content}</div>
  `;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// Typing indicator
function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="avatar">✦</div><div class="dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// Quick send
function quickSend(text) {
  msgInput.value = text;
  sendMessage();
}

// Check if message has images
function hasImages() {
  return attachments.length > 0;
}

// Send message
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text && !attachments.length) return;

  const currentFiles = [...attachments];
  addMessage(text || '📎 صورة', 'user', currentFiles);

  // Store in messages
  const userMsg = {
    role: 'user',
    content: text,
    displayText: text || '📎 صورة',
    files: currentFiles.map(f => ({ name: f.name, data: f.data }))
  };
  messages.push(userMsg);

  msgInput.value = '';
  msgInput.style.height = 'auto';
  attachments = [];
  renderAttachments();
  sendBtn.disabled = true;
  showTyping();

  try {
    let response;
    if (currentFiles.length > 0) {
      // Use Gemini Flash for image analysis
      response = await callGemini(text, currentFiles);
    } else {
      // Use DeepSeek for text chat
      response = await callDeepSeek(text);
    }

    hideTyping();
    addMessage(response, 'bot');
    messages.push({ role: 'assistant', content: response });
    saveChat();
  } catch (err) {
    hideTyping();
    addMessage('❌ حدث خطأ: ' + err.message, 'bot');
  }

  sendBtn.disabled = false;
  msgInput.focus();
}

// Call DeepSeek via API route
async function callDeepSeek(text) {
  const systemMsg = {
    role: 'system',
    content: 'أنت IB Agent، مساعد ذكاء اصطناعي محترف ومتكامل. تساعد في البرمجة والكتابة والتحليل والإبداع. أجب بنفس لغة المستخدم. كن مختصراً ومفيداً واحترافياً. استخدم التنسيق المناسب (code blocks, bold, lists) عند الحاجة.'
  };

  const chatMessages = [systemMsg];
  const recentMsgs = messages.slice(-10);
  for (const m of recentMsgs) {
    if (m.role === 'user') {
      chatMessages.push({ role: 'user', content: m.content || m.displayText });
    } else if (m.role === 'assistant') {
      chatMessages.push({ role: 'assistant', content: m.content });
    }
  }

  const res = await fetch(CONFIG.chatEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: CONFIG.deepseekModel,
      messages: chatMessages
    })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `API Error ${res.status}`);
  if (data.error) throw new Error(data.error);
  return data.choices?.[0]?.message?.content || 'لم أتمكن من الرد.';
}

// Call Gemini Flash via API route
async function callGemini(text, files) {
  const parts = [];

  if (text) parts.push({ text: text });

  for (const file of files) {
    const base64 = file.data.split(',')[1];
    const mimeType = file.data.split(';')[0].split(':')[1];
    parts.push({
      inline_data: {
        mime_type: mimeType,
        data: base64
      }
    });
  }

  if (!text) parts.unshift({ text: 'حلل هذه الصورة بالتفصيل وأعطني وصفاً شاملاً لمحتواها' });

  const res = await fetch(CONFIG.visionEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ parts })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `Gemini Error ${res.status}`);
  if (data.error) throw new Error(data.error);

  const candidate = data.candidates?.[0];
  if (!candidate) throw new Error('لا يوجد رد من Gemini');

  return candidate.content?.parts?.map(p => p.text).join('') || 'لم أتمكن من تحليل الصورة.';
}

function openSettings() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `
    <div class="modal">
      <h3>ℹ️ حول IB Agent <button onclick="closeModal()">✕</button></h3>
      <div class="settings-grid">
        <div class="setting-item">
          <label>🤖 محرك المحادثات</label>
          <input type="text" value="DeepSeek V3 (via OpenRouter)" readonly style="opacity:.7;cursor:default">
        </div>
        <div class="setting-item">
          <label>👁️ محرك تحليل الصور</label>
          <input type="text" value="Gemini 2.0 Flash" readonly style="opacity:.7;cursor:default">
        </div>
        <div class="setting-item">
          <label>🔐 المفاتيح</label>
          <input type="text" value="محفوظة في متغيرات البيئة ✓" readonly style="opacity:.7;cursor:default;color:#06d6a0">
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function saveSettings() { closeModal(); }

// History Modal
function openHistory() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

  let items = '';
  if (!allChats.length) {
    items = '<div class="hist-empty">لا توجد محادثات محفوظة</div>';
  } else {
    items = allChats.map(c => `
      <div class="hist-item" onclick="loadChat('${c.id}')">
        <span>${c.preview || 'محادثة'}</span>
        <span class="date">${c.date || ''}</span>
      </div>
    `).join('');
  }

  overlay.innerHTML = `
    <div class="modal">
      <h3>📋 المحادثات السابقة <button onclick="closeModal()">✕</button></h3>
      ${items}
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeModal() {
  const el = document.getElementById('modalOverlay');
  if (el) el.remove();
}

// Initialize app
init();
</script>
