<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-5.4 Pro Agent | إيجنت ذكي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7C3AED;
            --primary-light: #A78BFA;
            --primary-dark: #5B21B6;
            --accent: #0891B2;
            --accent-light: #22D3EE;
            --background: #0F0A1F;
            --surface: #1A1230;
            --surface-2: #241B3A;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border: #2D2247;
            --success: #22C55E;
            --error: #EF4444;
            --glass: rgba(124, 58, 237, 0.08);
            --glass-border: rgba(124, 58, 237, 0.2);
            --shadow: 0 8px 32px rgba(124, 58, 237, 0.15);
            --glow: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* === الخلفية المتحركة === */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: float 15s ease-in-out infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(8, 145, 178, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation: float 20s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* === التخطيط الرئيسي === */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }

        /* === الهيدر === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--glow);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary-light);
            box-shadow: var(--glow);
        }

        /* === منطقة الرسائل === */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* === الرسائل === */
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-start;
            flex-direction: row;
        }

        .message.assistant {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--surface-2);
            border: 1px solid var(--border);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.7;
            font-size: 15px;
        }

        .message.user .message-content {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-top-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.12), rgba(8, 145, 178, 0.08));
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
        }

        .message-content pre {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-size: 13px;
            direction: ltr;
            text-align: left;
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--background);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            direction: ltr;
        }

        /* === رسالة الترحيب === */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: var(--glow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }
            50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.5); }
        }

        .welcome-message h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-message p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 400px;
            margin: 0 auto 32px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .suggestion-btn {
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .suggestion-btn:hover {
            border-color: var(--primary);
            color: var(--primary-light);
            background: var(--glass);
            transform: translateY(-2px);
        }

        /* === مؤشر الكتابة === */
        .typing-indicator {
            display: none;
            align-self: flex-end;
            flex-direction: row-reverse;
            gap: 12px;
            max-width: 85%;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.12), rgba(8, 145, 178, 0.08));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            border-top-left-radius: 4px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: typingDot 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* === منطقة الإدخال === */
        .input-container {
            padding: 16px 0 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px 16px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        #messageInput {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            outline: none;
            line-height: 1.5;
        }

        #messageInput::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--glow);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            transform: rotate(180deg);
        }

        /* === الفوتر === */
        .footer {
            text-align: center;
            padding: 8px;
            color: var(--text-muted);
            font-size: 11px;
        }

        /* === Responsive === */
        @media (max-width: 640px) {
            .app-container {
                padding: 8px;
            }

            .header {
                padding: 12px 16px;
                border-radius: 12px;
            }

            .logo-text h1 {
                font-size: 15px;
            }

            .message {
                max-width: 92%;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }

            .welcome-message h2 {
                font-size: 20px;
            }
        }

        /* === Markdown Styling === */
        .message-content h1, .message-content h2, .message-content h3 {
            margin: 12px 0 6px;
            color: var(--primary-light);
        }

        .message-content ul, .message-content ol {
            padding-right: 20px;
            margin: 8px 0;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content strong {
            color: var(--accent-light);
        }

        .message-content a {
            color: var(--accent-light);
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="app-container">
        <!-- الهيدر -->
        <header class="header">
            <div class="header-logo">
                <div class="logo-icon">🤖</div>
                <div class="logo-text">
                    <h1>GPT-5.4 Pro Agent</h1>
                    <span>مدعوم بالذكاء الاصطناعي</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="clearChat()" title="محادثة جديدة">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
                <button class="btn-icon" onclick="toggleTheme()" title="تبديل الوضع">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- منطقة الرسائل -->
        <div class="messages-container" id="messagesContainer">
            <!-- رسالة الترحيب -->
            <div class="welcome-message" id="welcomeMessage">
                <div class="welcome-icon">🧠</div>
                <h2>مرحباً! أنا GPT-5.4</h2>
                <p>مساعدك الذكي المتقدم. اسألني أي شيء وسأساعدك بأفضل طريقة ممكنة.</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendSuggestion('اكتب لي كود HTML بسيط')">💻 اكتب لي كود HTML</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('اشرح لي البرمجة بشكل مبسط')">📖 اشرح لي البرمجة</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('ما هي أفضل لغات البرمجة؟')">🚀 أفضل لغات البرمجة</button>
                    <button class="suggestion-btn" onclick="sendSuggestion('ساعدني في حل مشكلة تقنية')">🔧 حل مشكلة تقنية</button>
                </div>
            </div>
        </div>

        <!-- مؤشر الكتابة -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-avatar" style="background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);">🤖</div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- منطقة الإدخال -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="اكتب رسالتك هنا..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>

        <div class="footer">
            GPT-5.4 Pro Agent — مدعوم بـ OpenRouter AI
        </div>
    </div>

    <script>
        // ==================== الإعدادات ====================
        // ضع مفتاح API الخاص بك هنا أو استخدم Environment Variable في Vercel
        const CONFIG = {
            API_URL: 'https://openrouter.ai/api/v1/chat/completions',
            API_KEY: localStorage.getItem('OPENROUTER_API_KEY') || 'YOUR_API_KEY_HERE',
            MODEL: 'openai/gpt-4o',
            SYSTEM_PROMPT: `أنت GPT-5.4 Pro Agent — مساعد ذكاء اصطناعي متقدم ومحترف.
            
قدراتك:
- فهم عميق للغة العربية والإنجليزية
- كتابة وتحليل الأكواد البرمجية بجميع اللغات
- إنشاء محتوى إبداعي عالي الجودة
- حل المشكلات المعقدة خطوة بخطوة
- التفكير المنطقي والتحليلي المتقدم

سلوكك:
- دقيق ومفصل في الإجابات
- محترف وودود في الأسلوب
- تقدم أمثلة عملية
- تستخدم التنسيق الجيد (عناوين، قوائم، أكواد)`
        };

        // ==================== المتغيرات ====================
        let conversationHistory = [];
        let isLoading = false;

        // ==================== العناصر ====================
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const welcomeMessage = document.getElementById('welcomeMessage');

        // ==================== الوظائف ====================

        // إرسال رسالة
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // إخفاء رسالة الترحيب
            if (welcomeMessage) {
                welcomeMessage.style.display = 'none';
            }

            // إضافة رسالة المستخدم
            addMessage('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // إضافة للتاريخ
            conversationHistory.push({ role: 'user', content: message });

            // إظهار مؤشر الكتابة
            setLoading(true);

            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.API_KEY}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'GPT-5.4 Pro Agent'
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        messages: [
                            { role: 'system', content: CONFIG.SYSTEM_PROMPT },
                            ...conversationHistory
                        ],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // إضافة رد المساعد
                addMessage('assistant', assistantMessage);
                conversationHistory.push({ role: 'assistant', content: assistantMessage });

            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', `⚠️ عذراً، حدث خطأ: ${error.message}\n\nيرجى المحاولة مرة أخرى.`);
            } finally {
                setLoading(false);
            }
        }

        // إضافة رسالة للواجهة
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '🤖';
            const formattedContent = formatMessage(content);

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${formattedContent}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // تنسيق الرسالة (Markdown بسيط)
        function formatMessage(text) {
            // أكواد كبيرة
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            // أكواد سطرية
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            // عناوين
            text = text.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            // Bold
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Italic
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // قوائم
            text = text.replace(/^\- (.*$)/gm, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            // روابط
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            // أسطر جديدة
            text = text.replace(/\n/g, '<br>');

            return text;
        }

        // إرسال اقتراح
        function sendSuggestion(text) {
            messageInput.value = text;
            sendMessage();
        }

        // التحكم بحالة التحميل
        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            typingIndicator.classList.toggle('active', loading);
            if (loading) scrollToBottom();
        }

        // التمرير للأسفل
        function scrollToBottom() {
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        // مسح المحادثة
        function clearChat() {
            conversationHistory = [];
            messagesContainer.innerHTML = '';

            // إعادة رسالة الترحيب
            messagesContainer.innerHTML = `
                <div class="welcome-message" id="welcomeMessage">
                    <div class="welcome-icon">🧠</div>
                    <h2>مرحباً! أنا GPT-5.4</h2>
                    <p>مساعدك الذكي المتقدم. اسألني أي شيء وسأساعدك بأفضل طريقة ممكنة.</p>
                    <div class="suggestions">
                        <button class="suggestion-btn" onclick="sendSuggestion('اكتب لي كود HTML بسيط')">💻 اكتب لي كود HTML</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('اشرح لي البرمجة بشكل مبسط')">📖 اشرح لي البرمجة</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('ما هي أفضل لغات البرمجة؟')">🚀 أفضل لغات البرمجة</button>
                        <button class="suggestion-btn" onclick="sendSuggestion('ساعدني في حل مشكلة تقنية')">🔧 حل مشكلة تقنية</button>
                    </div>
                </div>
            `;
        }

        // معالجة الضغط على Enter
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // تغيير حجم textarea تلقائياً
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // تبديل الوضع (placeholder)
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // إعداد API Key
        function setupApiKey() {
            const key = prompt('أدخل مفتاح OpenRouter API الخاص بك:');
            if (key && key.trim()) {
                localStorage.setItem('OPENROUTER_API_KEY', key.trim());
                CONFIG.API_KEY = key.trim();
                alert('✅ تم حفظ المفتاح بنجاح!');
            }
        }

        // تحقق من وجود مفتاح عند التحميل
        window.addEventListener('load', () => {
            if (!CONFIG.API_KEY || CONFIG.API_KEY === 'YOUR_API_KEY_HERE') {
                setupApiKey();
            }
        });
    </script>
</body>
</html>
