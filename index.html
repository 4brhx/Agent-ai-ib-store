<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent GPT-5.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6c63ff;
            --primary-light: #8b83ff;
            --bg-dark: #0a0a14;
            --bg-card: #14142a;
            --bg-input: #1a1a35;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --accent-green: #00d4aa;
            --accent-blue: #00b4d8;
            --gradient: linear-gradient(135deg, #6c63ff, #00d4aa);
            --radius: 14px;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .bg-effects {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .bg-effects .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.2;
            animation: orbFloat 10s ease-in-out infinite;
        }
        .bg-effects .orb:nth-child(1) { width: 500px; height: 500px; background: var(--primary); top: -150px; right: -150px; }
        .bg-effects .orb:nth-child(2) { width: 400px; height: 400px; background: var(--accent-green); bottom: -100px; left: -100px; animation-delay: 4s; }
        .bg-effects .orb:nth-child(3) { width: 250px; height: 250px; background: var(--accent-blue); top: 40%; left: 40%; animation-delay: 7s; }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(20px,-20px) scale(1.08); }
        }

        /* Header */
        .header {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            background: rgba(20, 20, 42, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(108, 99, 255, 0.15);
        }
        .header-logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient); border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 900;
            box-shadow: 0 4px 14px rgba(108, 99, 255, 0.35);
        }
        .header-logo h1 {
            font-size: 1.2rem; font-weight: 700;
            background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .status-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 16px;
            background: rgba(0,212,170,0.08); border: 1px solid rgba(0,212,170,0.25);
            font-size: 0.75rem; color: var(--accent-green);
        }
        .status-badge .dot { width: 7px; height: 7px; background: var(--accent-green); border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .clear-btn {
            padding: 5px 12px; border-radius: 16px;
            background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.25);
            color: #ff5050; font-size: 0.75rem; font-family: inherit; cursor: pointer; transition: 0.2s;
        }
        .clear-btn:hover { background: rgba(255,80,80,0.15); }

        /* Chat */
        .chat-area {
            position: relative; z-index: 10;
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(108,99,255,0.25); border-radius: 3px; }

        /* Welcome */
        .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 30px 16px; }
        .welcome .avatar-big {
            width: 90px; height: 90px; background: var(--gradient); border-radius: 26px;
            display: flex; align-items: center; justify-content: center; font-size: 42px;
            margin-bottom: 20px; box-shadow: 0 16px 50px rgba(108,99,255,0.25);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }
        .welcome h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .welcome p { color: var(--text-secondary); font-size: 0.95rem; max-width: 380px; line-height: 1.7; margin-bottom: 28px; }
        .suggestions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 460px; width: 100%; }
        .sug-card {
            background: rgba(20,20,42,0.7); border: 1px solid rgba(108,99,255,0.15);
            border-radius: 10px; padding: 14px; cursor: pointer; transition: 0.25s; text-align: right;
        }
        .sug-card:hover { background: rgba(108,99,255,0.08); border-color: var(--primary); transform: translateY(-2px); }
        .sug-card .s-icon { font-size: 22px; margin-bottom: 6px; }
        .sug-card .s-text { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.4; }

        /* Messages */
        .msg { display: flex; gap: 10px; max-width: 82%; animation: msgIn 0.25s ease; }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .msg.user { align-self: flex-start; }
        .msg.bot { align-self: flex-end; flex-direction: row-reverse; }
        .msg .av {
            width: 34px; height: 34px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
        }
        .msg.user .av { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.25); }
        .msg.bot .av { background: var(--gradient); box-shadow: 0 3px 10px rgba(108,99,255,0.25); }
        .msg .bbl { padding: 12px 16px; border-radius: var(--radius); line-height: 1.7; font-size: 0.9rem; word-wrap: break-word; }
        .msg.user .bbl { background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.15); border-top-right-radius: 4px; }
        .msg.bot .bbl { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.04); border-top-left-radius: 4px; }
        .msg.bot .bbl code { background: rgba(108,99,255,0.12); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 0.82rem; }
        .msg.bot .bbl pre { background: rgba(0,0,0,0.35); padding: 10px; border-radius: 7px; overflow-x: auto; margin: 6px 0; font-family: monospace; font-size: 0.82rem; line-height: 1.5; direction: ltr; text-align: left; }

        /* File Preview in message */
        .file-preview { margin-bottom: 8px; }
        .file-preview img { max-width: 260px; max-height: 200px; border-radius: 10px; border: 1px solid rgba(108,99,255,0.2); }
        .file-preview .file-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2);
            border-radius: 8px; padding: 8px 12px; font-size: 0.8rem; color: var(--text-secondary);
        }

        /* Typing */
        .typing { display: flex; gap: 10px; align-self: flex-end; flex-direction: row-reverse; }
        .typing .av { width: 34px; height: 34px; border-radius: 9px; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .typing .dots { display: flex; align-items: center; gap: 4px; padding: 12px 16px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.04); border-radius: var(--radius); border-top-left-radius: 4px; }
        .typing .dots span { width: 7px; height: 7px; background: var(--primary-light); border-radius: 50%; animation: dotJump 1.4s infinite; }
        .typing .dots span:nth-child(2){animation-delay:0.15s;} .typing .dots span:nth-child(3){animation-delay:0.3s;}
        @keyframes dotJump { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-5px);} }

        /* Input */
        .input-section {
            position: relative; z-index: 10;
            padding: 14px 20px 20px;
            background: rgba(20,20,42,0.85); backdrop-filter: blur(16px);
            border-top: 1px solid rgba(108,99,255,0.1);
        }
        .input-box {
            display: flex; align-items: flex-end; gap: 8px;
            max-width: 780px; margin: 0 auto;
            background: var(--bg-input); border: 1px solid rgba(108,99,255,0.15);
            border-radius: 14px; padding: 8px 10px 8px 14px;
            transition: 0.25s;
        }
        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 16px rgba(108,99,255,0.12); }
        .input-box textarea {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-primary); font-family: inherit; font-size: 0.9rem;
            resize: none; max-height: 100px; padding: 8px 0; line-height: 1.5;
        }
        .input-box textarea::placeholder { color: var(--text-secondary); }

        /* Attachment area */
        .attach-preview {
            display: none; max-width: 780px; margin: 0 auto 8px;
            padding: 8px 12px; background: rgba(108,99,255,0.06);
            border: 1px solid rgba(108,99,255,0.15); border-radius: 10px;
        }
        .attach-preview.active { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .attach-item { display: flex; align-items: center; gap: 6px; background: var(--bg-card); border-radius: 8px; padding: 5px 10px; font-size: 0.78rem; color: var(--text-secondary); }
        .attach-item img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
        .attach-item .remove-att { cursor: pointer; color: #ff5050; font-size: 14px; margin-right: 4px; }

        .input-actions { display: flex; align-items: center; gap: 6px; }
        .attach-btn {
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .attach-btn:hover { background: rgba(108,99,255,0.2); }
        .attach-btn svg { width: 18px; height: 18px; stroke: var(--text-secondary); fill: none; stroke-width: 2; }
        .send-btn {
            width: 40px; height: 40px; background: var(--gradient); border: none; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.06); box-shadow: 0 3px 12px rgba(108,99,255,0.35); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .send-btn svg { width: 18px; height: 18px; fill: #fff; transform: rotate(180deg); }
        .footer-txt { text-align: center; margin-top: 6px; font-size: 0.7rem; color: var(--text-secondary); opacity: 0.5; }

        #fileInput { display: none; }

        @media (max-width: 600px) {
            .header { padding: 10px 14px; }
            .header-logo h1 { font-size: 1rem; }
            .chat-area { padding: 14px; }
            .msg { max-width: 92%; }
            .suggestions { grid-template-columns: 1fr; }
            .welcome h2 { font-size: 1.3rem; }
            .welcome .avatar-big { width: 70px; height: 70px; font-size: 32px; }
            .input-section { padding: 10px 14px 14px; }
        }
    </style>
</head>
<body>
    <div class="bg-effects"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

    <header class="header">
        <div class="header-logo">
            <div class="logo-icon">AI</div>
            <h1>Agent GPT-5.4</h1>
        </div>
        <div class="header-right">
            <div class="status-badge"><span class="dot"></span><span>متصل</span></div>
            <button class="clear-btn" onclick="clearChat()">محادثة جديدة</button>
        </div>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="avatar-big">🤖</div>
            <h2>مرحباً، أنا Agent GPT-5.4</h2>
            <p>مساعدك الذكي المتقدم. اسألني أي شيء، ارفع صورة أو ملف وسأساعدك!</p>
            <div class="suggestions">
                <div class="sug-card" onclick="useSuggestion('اكتب لي كود Python لتحليل البيانات')"><div class="s-icon">💻</div><div class="s-text">اكتب لي كود Python</div></div>
                <div class="sug-card" onclick="useSuggestion('اشرح لي الذكاء الاصطناعي بالتفصيل')"><div class="s-icon">🧠</div><div class="s-text">اشرح لي الذكاء الاصطناعي</div></div>
                <div class="sug-card" onclick="useSuggestion('ساعدني في كتابة مقال احترافي')"><div class="s-icon">✍️</div><div class="s-text">كتابة مقال احترافي</div></div>
                <div class="sug-card" onclick="useSuggestion('حلل لي هذه الصورة')"><div class="s-icon">🖼️</div><div class="s-text">تحليل صورة</div></div>
            </div>
        </div>
    </div>

    <div class="input-section">
        <div class="attach-preview" id="attachPreview"></div>
        <div class="input-box">
            <div class="input-actions">
                <label class="attach-btn" for="fileInput" title="رفع صورة أو ملف">
                    <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </label>
            </div>
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.doc,.docx,.csv,.json,.js,.py,.html,.css" onchange="handleFiles(event)">
            <textarea id="msgInput" placeholder="اكتب رسالتك هنا..." rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        <div class="footer-txt">Agent GPT-5.4 — مدعوم بـ OpenRouter AI</div>
    </div>

    <script>
        const _k = 'c2stb3ItdjEtMGFkZmYwOTViMTAzNDY4MThmZjA3MGZmZTk5ZTdlMWYxZTgwZWY3ZGIwM2YyMjRlZGY0ZjMyODhjNDhhZjI0YQ==';
        const OPENROUTER_KEY = atob(_k);
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        const MODEL = 'openai/gpt-4o';

        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeEl = document.getElementById('welcome');
        const attachPreview = document.getElementById('attachPreview');

        let history = [];
        let attachments = []; // {type:'image', name:'...', base64:'...', dataUrl:'...'}

        function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
        function useSuggestion(t) { msgInput.value = t; autoGrow(msgInput); send(); }

        function handleFiles(e) {
            const files = e.target.files;
            for (let f of files) {
                const reader = new FileReader();
                const isImage = f.type.startsWith('image/');
                reader.onload = function(ev) {
                    const base64 = ev.target.result;
                    attachments.push({ type: isImage ? 'image' : 'file', name: f.name, base64: base64, mimeType: f.type });
                    renderAttachments();
                };
                reader.readAsDataURL(f);
            }
            e.target.value = '';
        }

        function renderAttachments() {
            if (attachments.length === 0) { attachPreview.className = 'attach-preview'; return; }
            attachPreview.className = 'attach-preview active';
            attachPreview.innerHTML = attachments.map((a, i) => {
                if (a.type === 'image') {
                    return `<div class="attach-item"><img src="${a.base64}" alt="${a.name}"><span>${a.name}</span><span class="remove-att" onclick="removeAtt(${i})">✕</span></div>`;
                }
                return `<div class="attach-item"><span>📄</span><span>${a.name}</span><span class="remove-att" onclick="removeAtt(${i})">✕</span></div>`;
            }).join('');
        }

        function removeAtt(i) { attachments.splice(i, 1); renderAttachments(); }

        function clearChat() {
            history = []; attachments = [];
            chatArea.innerHTML = `<div class="welcome" id="welcome"><div class="avatar-big">🤖</div><h2>مرحباً، أنا Agent GPT-5.4</h2><p>مساعدك الذكي المتقدم. اسألني أي شيء، ارفع صورة أو ملف وسأساعدك!</p><div class="suggestions"><div class="sug-card" onclick="useSuggestion('اكتب لي كود Python لتحليل البيانات')"><div class="s-icon">💻</div><div class="s-text">اكتب لي كود Python</div></div><div class="sug-card" onclick="useSuggestion('اشرح لي الذكاء الاصطناعي بالتفصيل')"><div class="s-icon">🧠</div><div class="s-text">اشرح لي الذكاء الاصطناعي</div></div><div class="sug-card" onclick="useSuggestion('ساعدني في كتابة مقال احترافي')"><div class="s-icon">✍️</div><div class="s-text">كتابة مقال احترافي</div></div><div class="sug-card" onclick="useSuggestion('حلل لي هذه الصورة')"><div class="s-icon">🖼️</div><div class="s-text">تحليل صورة</div></div></div></div>`;
            renderAttachments();
        }

        function formatMsg(t) {
            t = t.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
            t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            t = t.replace(/\n/g, '<br>');
            return t;
        }

        function addMsg(content, role, files = []) {
            const w = document.getElementById('welcome');
            if (w) w.remove();
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
            let fileHTML = '';
            if (files.length > 0) {
                fileHTML = '<div class="file-preview">' + files.map(f => {
                    if (f.type === 'image') return `<img src="${f.base64}" alt="${f.name}">`;
                    return `<div class="file-badge">📄 ${f.name}</div>`;
                }).join('') + '</div>';
            }
            const formatted = role === 'user' ? content.replace(/\n/g,'<br>') : formatMsg(content);
            div.innerHTML = `<div class="av">${role === 'user' ? '👤' : '🤖'}</div><div class="bbl">${fileHTML}${formatted}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const d = document.createElement('div'); d.className = 'typing'; d.id = 'typingEl';
            d.innerHTML = `<div class="av">🤖</div><div class="dots"><span></span><span></span><span></span></div>`;
            chatArea.appendChild(d); chatArea.scrollTop = chatArea.scrollHeight;
        }
        function hideTyping() { const t = document.getElementById('typingEl'); if(t) t.remove(); }

        async function send() {
            const text = msgInput.value.trim();
            if (!text && attachments.length === 0) return;

            // Build user message content
            const currentAttachments = [...attachments];
            addMsg(text || '(ملف مرفق)', 'user', currentAttachments);

            // Build API content
            let userContent = [];
            if (currentAttachments.length > 0) {
                for (let a of currentAttachments) {
                    if (a.type === 'image') {
                        userContent.push({ type: 'image_url', image_url: { url: a.base64 } });
                    } else {
                        userContent.push({ type: 'text', text: `[ملف مرفق: ${a.name}]` });
                    }
                }
            }
            if (text) userContent.push({ type: 'text', text: text });
            if (userContent.length === 1 && userContent[0].type === 'text') {
                history.push({ role: 'user', content: text });
            } else {
                history.push({ role: 'user', content: userContent });
            }

            // Clear
            msgInput.value = ''; msgInput.style.height = 'auto';
            attachments = []; renderAttachments();
            sendBtn.disabled = true;
            showTyping();

            const sysMsg = { role: 'system', content: 'أنت Agent GPT-5.4، مساعد ذكاء اصطناعي متقدم. تتحدث العربية بطلاقة. تساعد في البرمجة والكتابة والتحليل وحل المشكلات. عند إرسال صور تحللها بالتفصيل. كن مفصلاً ومحترفاً وودوداً.' };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + OPENROUTER_KEY,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Agent GPT-5.4'
                    },
                    body: JSON.stringify({ model: MODEL, messages: [sysMsg, ...history], temperature: 0.7, max_tokens: 4096 })
                });

                hideTyping();
                if (!res.ok) {
                    const errText = await res.text();
                    addMsg('خطأ من الخادم: ' + res.status + ' - ' + errText.substring(0, 200), 'bot');
                } else {
                    const data = await res.json();
                    if (data.choices && data.choices[0]) {
                        const reply = data.choices[0].message.content;
                        addMsg(reply, 'bot');
                        history.push({ role: 'assistant', content: reply });
                    } else if (data.error) {
                        addMsg('خطأ: ' + (data.error.message || JSON.stringify(data.error)), 'bot');
                    } else {
                        addMsg('لم أتمكن من الحصول على رد. حاول مرة أخرى.', 'bot');
                    }
                }
            } catch (err) {
                hideTyping();
                addMsg('خطأ في الاتصال: ' + err.message + '. تأكد من اتصالك بالإنترنت.', 'bot');
            }
            sendBtn.disabled = false;
            msgInput.focus();
        }

        msgInput.focus();
    </script>
</body>
</html>
